<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Story</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* Scene container */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: opacity 1.5s;
}
.active { display: flex; }

/* Backgrounds */
.city { background: linear-gradient(#0f2027,#203a43,#2c5364); }
.sunrise { background: linear-gradient(#ff9966,#ff5e62); }
.night { background: linear-gradient(#000000,#434343); }
.taj { background: linear-gradient(#001f3f,#0074D9); }

/* Glass text */
.glass {
  background: rgba(0,0,0,0.4);
  padding: 15px 25px;
  border-radius: 20px;
}

/* SVG Characters */
.char {
  width: 120px;
  height: 120px;
}

/* Heart beat */
.heart {
  font-size: 60px;
  animation: beat 1s infinite;
}
@keyframes beat {
  50% { transform: scale(1.3); }
}

/* Camera zoom effect */
.zoom {
  animation: zoomIn 4s linear forwards;
}
@keyframes zoomIn {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
</style>
</head>

<body>

<!-- Scene 1 -->
<div class="scene active city zoom" id="s1">
  <div class="glass">
    <!-- Boy SVG -->
    <svg class="char" viewBox="0 0 100 100">
      <circle cx="50" cy="35" r="20" fill="#ffd1a9"/>
      <rect x="30" y="55" width="40" height="35" fill="#3498db"/>
    </svg>
    <p>I was just a boy…</p>
  </div>
</div>

<!-- Scene 2 -->
<div class="scene sunrise zoom" id="s2">
  <div class="glass">
    <!-- Girl SVG -->
    <svg class="char" viewBox="0 0 100 100">
      <circle cx="50" cy="35" r="20" fill="#ffd1a9"/>
      <rect x="30" y="55" width="40" height="35" fill="#e84393"/>
    </svg>
    <p>She was my whole world…</p>
  </div>
</div>

<!-- Scene 3 -->
<div class="scene night zoom" id="s3">
  <div class="glass">
    <div style="font-size:70px;">👧 ❤️ 👦</div>
    <p>Our hearts found each other</p>
  </div>
</div>

<!-- Scene 4 -->
<div class="scene night zoom" id="s4">
  <div class="glass">
    <div style="font-size:70px;">👧 💔 👦</div>
    <p>But distance tested our love</p>
  </div>
</div>

<!-- Scene 5 -->
<div class="scene sunrise zoom" id="s5">
  <div class="glass">
    <div style="font-size:70px;">👦 💍 👧</div>
    <p>Will you stay forever?</p>
  </div>
</div>

<!-- Scene 6 -->
<div class="scene taj zoom" id="s6">
  <div class="glass">
    <div style="font-size:70px;">👧 💞 👦</div>
    <p>Love always wins</p>
  </div>
</div>

<!-- Scene 7 -->
<div class="scene night zoom" id="s7">
  <div class="glass">
    <h1>💖 Our Story Never Ends 💖</h1>
  </div>
</div>

<script>
let scene = 1;
const total = 7;

function nextScene() {
  document.getElementById("s" + scene).classList.remove("active");
  scene = scene % total + 1;
  document.getElementById("s" + scene).classList.add("active");
}

setInterval(nextScene, 5000);
</script>

<!-- Voice narration -->
<audio autoplay>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<!-- Background music -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/ImperialMarch60.wav" type="audio/wav">
</audio>

</body>
</html>
