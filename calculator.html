<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Miles Apart, Hearts Together</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
}

/* Scene container */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 2s;
}

/* Active scene */
.active {
  opacity: 1;
}

/* Characters */
.character {
  position: absolute;
  bottom: 40px;
  width: 120px;
}

/* Boy */
.boy {
  left: 10%;
}

/* Girl */
.girl {
  right: 10%;
}

/* Text */
.text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 15%;
  font-size: 28px;
  text-shadow: 0 0 10px black;
}

/* Backgrounds */
.city { background: url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade?q=80&w=1920') center/cover; }
.night { background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1920') center/cover; }
.moon { background: url('https://images.unsplash.com/photo-1508261303786-0e0f28b3de8c?q=80&w=1920') center/cover; }
.airport { background: url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde?q=80&w=1920') center/cover; }

button {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  font-size: 18px;
  background: pink;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1c64d6b36e.mp3?filename=romantic-background-112191.mp3">
</audio>

<!-- 🎙️ Voice Narration -->
<script>
function speak(text){
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  speechSynthesis.speak(msg);
}
</script>

<!-- 🎬 SCENE 1 -->
<div class="scene city active" id="scene1">
  <div class="text">Miles apart… but hearts connected.</div>
  <img class="character boy" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <img class="character girl" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
</div>

<!-- 🎬 SCENE 2 -->
<div class="scene night" id="scene2">
  <div class="text">Every night, they miss each other…</div>
  <img class="character boy" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <img class="character girl" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
</div>

<!-- 🎬 SCENE 3 -->
<div class="scene moon" id="scene3">
  <div class="text">"Can you hear me?"</div>
  <img class="character boy" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <img class="character girl" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
</div>

<!-- 🎬 SCENE 4 -->
<div class="scene moon" id="scene4">
  <div class="text">Same moon… same love.</div>
  <img class="character boy" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <img class="character girl" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
</div>

<!-- 🎬 SCENE 5 -->
<div class="scene airport" id="scene5">
  <div class="text">Soon… no more distance.</div>
  <img class="character boy" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <img class="character girl" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
</div>

<button onclick="startFilm()">▶ Start Film</button>

<script>
const scenes = ["scene1","scene2","scene3","scene4","scene5"];
let current = 0;

function showScene(index){
  document.querySelectorAll(".scene").forEach(s=>s.classList.remove("active"));
  document.getElementById(scenes[index]).classList.add("active");
}

function startFilm(){
  document.getElementById("music").play();
  playScene();
}

function playScene(){
  if(current >= scenes.length) return;

  showScene(current);

  const texts = [
    "Miles apart… but hearts connected.",
    "Every night, they miss each other.",
    "Can you hear me?",
    "Same moon. Same love.",
    "Soon… no more distance."
  ];

  speak(texts[current]);

  current++;
  setTimeout(playScene, 5000);
}
</script>

</body>
</html>
