<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Love Story</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* Scenes */
.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}
.active { display: flex; }

/* Hero slow motion entry */
.hero {
  font-size: 90px;
  animation: slowEntry 3s ease forwards;
}
@keyframes slowEntry {
  from { transform: translateY(-200px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Rain effect */
.rain {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/T0mBFg2.png');
  opacity: 0.25;
}

/* Heart beat */
.heart {
  font-size: 60px;
  animation: beat 1s infinite;
}
@keyframes beat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* Beat transition flash */
.flash {
  animation: flash 0.5s alternate 3;
}
@keyframes flash {
  from { background:black; }
  to { background:#330000; }
}

/* Taj Mahal background */
.taj {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/4NJlK6i.jpg') center/cover no-repeat;
  opacity: 0.35;
}

/* Sad breakup fade */
.sad {
  color: #bbb;
  animation: fadeSad 3s forwards;
}
@keyframes fadeSad {
  from { opacity:1; }
  to { opacity:0.3; }
}
</style>
</head>

<body>

<!-- Scene 1: Hero Entry -->
<div class="scene active" id="s1">
  <div class="hero">👦</div>
  <p>Ek ladka… jo sirf usse chahta tha</p>
</div>

<!-- Scene 2: Girl Entry -->
<div class="scene" id="s2">
  <div class="hero">👧</div>
  <p>Ek ladki… jo uski duniya thi</p>
</div>

<!-- Scene 3: Rain Love Scene -->
<div class="scene" id="s3">
  <div class="rain"></div>
  <div style="font-size:70px;">👧 ☔ 👦</div>
  <p>Barish mein… pyaar aur gehra ho gaya</p>
</div>

<!-- Scene 4: Heart Beat -->
<div class="scene flash" id="s4">
  <div>👧 <span class="heart">❤️</span> 👦</div>
  <p>Dil ek saath dhadakte the</p>
</div>

<!-- Scene 5: Sad Breakup -->
<div class="scene sad" id="s5">
  <div style="font-size:70px;">👧 💔 👦</div>
  <p>Kabhi kabhi… pyaar adhura reh jaata hai</p>
</div>

<!-- Scene 6: Distance -->
<div class="scene" id="s6">
  <div style="font-size:70px;">👧 🌍 👦</div>
  <p>Dooriyan badh gayi…</p>
</div>

<!-- Scene 7: Taj Mahal Reunion -->
<div class="scene" id="s7">
  <div class="taj"></div>
  <div style="font-size:70px;">👧 💞 👦</div>
  <p>Pyaar phir jeet gaya</p>
</div>

<!-- Scene 8: Forever -->
<div class="scene" id="s8">
  <h1>💖 Forever Together 💖</h1>
</div>

<script>
let scene = 1;
const total = 8;

function nextScene() {
  document.getElementById("s" + scene).classList.remove("active");
  scene = scene % total + 1;
  document.getElementById("s" + scene).classList.add("active");
}

setInterval(nextScene, 3500);
</script>

</body>
</html>
