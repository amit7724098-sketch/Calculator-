<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Miles Apart, Hearts Together</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

.frame {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 28px;
}

.active { display: flex; }

.heart {
  font-size: 40px;
  animation: moveHeart 3s linear infinite;
}

@keyframes moveHeart {
  0% { transform: translateX(-200px); }
  100% { transform: translateX(200px); }
}

.moon {
  font-size: 60px;
}

.hug {
  font-size: 50px;
  animation: hugMove 2s infinite alternate;
}

@keyframes hugMove {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}
</style>
</head>
<body>

<div class="frame active" id="f1">
  🌆 Ammu &nbsp;&nbsp;&nbsp;&nbsp; Simmy 🌃
  <p>── miles apart ──</p>
</div>

<div class="frame" id="f2">
  Ammu 💭💖────────────💖💭 Simmy
  <p>Missing each other</p>
</div>

<div class="frame" id="f3">
  Ammu ☎️💙 ~~~~~ Simmy
  <p>“Can you hear me?”</p>
</div>

<div class="frame" id="f4">
  Ammu <span class="heart">💗</span> Simmy
</div>

<div class="frame" id="f5">
  <div class="moon">🌙</div>
  <p>Same moon, same love</p>
</div>

<div class="frame" id="f6">
  ✈️ Ammu ⟶⟶⟶ Simmy ✈️
  <div class="hug">(づ｡◕‿‿◕｡)づ♡(｡◕‿‿◕｡づ)</div>
  <p>No More Distance 🤍</p>
</div>

<script>
let current = 1;
const totalFrames = 6;

function showNextFrame() {
  document.getElementById("f" + current).classList.remove("active");
  current = current % totalFrames + 1;
  document.getElementById("f" + current).classList.add("active");
}

setInterval(showNextFrame, 3000);
</script>

</body>
</html>
